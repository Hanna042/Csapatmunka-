<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Módosítás</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/modositas.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="index.html" id="boltnev">VW áruház</a>
    </div>
  </nav>
</header>

<main class="container py-4">
  <h2>Termék módosítása</h2>

  <div id="uzenet" class="alert alert-danger d-none"></div>


  <div id="product-list" class="row g-3"></div>

  <div id="edit-card" class="card mt-3 d-none">
    <div class="card-body">

      <div class="mb-3">
        <label class="form-label">Termék neve</label>
        <p id="prod-title" class="form-control-plaintext"></p>
      </div>

      <div class="mb-3">
        <label class="form-label">Ár</label>
        <input id="price-input" type="number" class="form-control">
        <div id="price-huf-preview"></div>
      </div>

      <div class="mt-3">
        <button id="ok-btn" class="btn btn-primary">Mentés</button>
        <button id="cancel-btn" class="btn btn-secondary">Mégse</button>
      </div>

    </div>
  </div>
</main>

<script src="js/theme.js" defer></script>
<script type="module" src="js/modositas.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/js/bootstrap.min.js"></script>
</body>
</html>
