<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termék hozzáadása</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/hozzaadas.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="boltnev">VW áruház</a>
            <div class="collapse navbar-collapse">
            </div>
        </div>
    </nav>
    </header>
    <main class="container py-4">
        <h1 class="h3 mb-4 hozzaad">Termék hozzáadása</h1>

        <form id="addProductForm">
            <div class="mb-3 hozzaad">
                <label class="form-label">Termék neve</label>
                <input type="text" class="form-control" id="productName" required>
            </div>

            <div class="mb-3 hozzaad">
                <label class="form-label">Termék ára</label>
                <input type="number" class="form-control" id="productPrice" required>
            </div>

            <div class="mb-3 hozzaad">
                <label class="form-label">Termék leírása</label>
                <textarea class="form-control" id="productDescription" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Hozzáadás</button>
        </form>
    </main>

    <script src="js/theme.js" defer></script>
    <script type="module" src="js/hozzaadas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/js/bootstrap.min.js"></script>
</body>
</html>
